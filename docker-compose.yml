networks:
  ecommerce-net:
    driver: bridge

services:

  users-service:
    build:
      context: ./users-service
    container_name: users-service
    networks:
      - ecommerce-net
    volumes:
      - ./certs:/certs:ro
      - ./data:/data
    environment:
      PORT: "5001"
      JWT_SECRET: "${JWT_SECRET:-sneaker_jwt_secret_2024}"
      JWT_EXPIRATION_MS: "86400000"
      DB_PATH: "/data/users.db"
      KEYSTORE_PATH: "/certs/keystore.jks"
      KEYSTORE_PASSWORD: "keystorepass"
      KEY_ALIAS: "ecommerce"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- --no-check-certificate https://localhost:5001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  products-primary:
    build:
      context: ./products-service
    container_name: products-primary
    networks:
      - ecommerce-net
    volumes:
      - ./certs:/certs:ro
      - ./data:/data
    environment:
      PORT: "5002"
      SERVICE_ROLE: "primary"
      REPLICA_URL: "https://products-replica:5012"
      DB_PATH: "/data/products-primary.db"
      KEYSTORE_PATH: "/certs/keystore.jks"
      KEYSTORE_PASSWORD: "keystorepass"
      KEY_ALIAS: "ecommerce"
    depends_on:
      - products-replica
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- --no-check-certificate https://localhost:5002/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  products-replica:
    build:
      context: ./products-service
    container_name: products-replica
    networks:
      - ecommerce-net
    volumes:
      - ./certs:/certs:ro
      - ./data:/data
    environment:
      PORT: "5012"
      SERVICE_ROLE: "replica"
      DB_PATH: "/data/products-replica.db"
      KEYSTORE_PATH: "/certs/keystore.jks"
      KEYSTORE_PASSWORD: "keystorepass"
      KEY_ALIAS: "ecommerce"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- --no-check-certificate https://localhost:5012/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  orders-service:
    build:
      context: ./orders-service
    container_name: orders-service
    networks:
      - ecommerce-net
    volumes:
      - ./certs:/certs:ro
      - ./data:/data
    environment:
      PORT: "5003"
      PRODUCTS_PRIMARY_URL: "https://products-primary:5002"
      DB_PATH: "/data/orders.db"
      KEYSTORE_PATH: "/certs/keystore.jks"
      KEYSTORE_PASSWORD: "keystorepass"
      KEY_ALIAS: "ecommerce"
    depends_on:
      - products-primary
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- --no-check-certificate https://localhost:5003/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  gateway:
    build:
      context: ./gateway-service
    container_name: gateway
    networks:
      - ecommerce-net
    ports:
      - "8080:8080"
    volumes:
      - ./certs:/certs:ro
    environment:
      PORT: "8080"
      JWT_SECRET: "${JWT_SECRET:-sneaker_jwt_secret_2024}"
      USERS_SERVICE_URL: "https://users-service:5001"
      PRODUCTS_PRIMARY_URL: "https://products-primary:5002"
      PRODUCTS_REPLICA_URL: "https://products-replica:5012"
      ORDERS_SERVICE_URL: "https://orders-service:5003"
      KEYSTORE_PATH: "/certs/keystore.jks"
      KEYSTORE_PASSWORD: "keystorepass"
      KEY_ALIAS: "ecommerce"
    depends_on:
      - users-service
      - products-primary
      - orders-service
